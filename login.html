<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HuellaED — Ingresar</title>
  <meta name="theme-color" content="#2D5F4F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HuellaED">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --verde:#2D5F4F;--verde2:#3A7A65;--verde-claro:#7BAE99;--verde-bg:#E8F4EF;
      --terracota:#C8845A;--terracota-bg:#FDF0E8;
      --crema:#F5F2EE;--gris-claro:#E8E4DF;--gris:#8A7E6A;
      --negro:#2D3A35;--blanco:#FFFFFF;
      --radius:14px;--radius-sm:10px;--shadow:0 1px 4px rgba(0,0,0,0.08);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--crema);min-height:100vh;color:var(--negro);display:flex;flex-direction:column;}

    /* HEADER */
    header{background:var(--verde);padding:18px 20px 14px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 16px rgba(0,0,0,0.18);}
    .logo-svg{flex-shrink:0;}
    .header-text h1{font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.5px;line-height:1;}
    .header-text h1 span{color:var(--verde-claro);font-weight:300;}
    .header-text p{font-size:10px;color:rgba(168,201,188,0.85);letter-spacing:2.5px;text-transform:uppercase;margin-top:3px;}

    /* LOGIN */
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;}
    .login-card{background:var(--blanco);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.10);}
    .login-card h2{font-size:18px;font-weight:700;color:var(--negro);margin-bottom:4px;}
    .login-card p{font-size:12px;color:var(--gris);margin-bottom:24px;}

    label{display:block;font-size:11px;font-weight:700;color:var(--gris);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
    .field{margin-bottom:16px;}
    input[type=email],input[type=password]{
      width:100%;padding:11px 14px;border:1.5px solid var(--gris-claro);border-radius:var(--radius-sm);
      font-size:14px;font-family:inherit;background:#fff;color:var(--negro);
      transition:border-color 0.15s;outline:none;
    }
    input[type=email]:focus,input[type=password]:focus{border-color:var(--verde);}

    .btn{
      width:100%;padding:13px;background:var(--verde);color:#fff;border:none;border-radius:var(--radius-sm);
      font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;
      transition:background 0.15s,transform 0.1s;margin-top:4px;
    }
    .btn:active{transform:scale(0.98);background:var(--verde2);}
    .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

    .error{
      background:#FDE8E8;border:1.5px solid #F5C0C0;border-radius:var(--radius-sm);
      padding:10px 14px;font-size:12px;color:#B04040;margin-bottom:16px;display:none;
    }
    .error.visible{display:block;}

    footer{text-align:center;padding:10px;font-size:10px;color:var(--gris);letter-spacing:1px;}
  </style>
</head>
<body>

<header>
  <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 66" width="38" height="46">
    <path fill="none" stroke="#7BAE99" stroke-width="2.2" stroke-linecap="round" d="M6,33 C6,17 16,7 28,7 C40,7 50,17 50,33 C50,44 45,53 38,58"/>
    <path fill="none" stroke="#7BAE99" stroke-width="1.9" stroke-linecap="round" d="M12,34 C12,20 19,13 28,13 C37,13 44,20 44,34 C44,43 40,50 34,55"/>
    <path fill="none" stroke="#7BAE99" stroke-width="1.6" stroke-linecap="round" d="M18,35 C18,25 22,19 28,19 C34,19 38,25 38,35 C38,42 35,48 31,52"/>
    <path fill="none" stroke="#7BAE99" stroke-width="1.3" stroke-linecap="round" d="M24,36 C24,30 25,25 28,25 C31,25 32,30 32,36 C32,41 30,45 28,48"/>
    <ellipse cx="28" cy="35" rx="3.5" ry="4.5" fill="none" stroke="#7BAE99" stroke-width="1.2"/>
    <circle cx="50" cy="9" r="3.5" fill="#C8845A"/>
  </svg>
  <div class="header-text">
    <h1>Huella<span>ED</span></h1>
    <p>cada alumno, su trayecto</p>
  </div>
</header>

<main>
  <div class="login-card">
    <h2>Ingresar</h2>
    <p>Accedé con tu cuenta institucional</p>

    <div id="error-msg" class="error"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="btn-login">Ingresar</button>
    </form>
  </div>
</main>

<footer>HUELLAED · CADA ALUMNO, SU TRAYECTO</footer>

<script type="module">
  import { supabase } from './supabase.js'

  const form = document.getElementById('login-form')
  const btnLogin = document.getElementById('btn-login')
  const errorMsg = document.getElementById('error-msg')

  function showError(msg) {
    errorMsg.textContent = msg
    errorMsg.classList.add('visible')
  }

  function clearError() {
    errorMsg.classList.remove('visible')
  }

  // Si fue redirigido desde index.html por cuenta desactivada, mostrarlo al cargar
  const _urlParams = new URLSearchParams(window.location.search)
  if (_urlParams.get('desactivada')) {
    showError('Tu cuenta está desactivada. Contactá al administrador para reactivarla.')
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    clearError()
    btnLogin.disabled = true
    btnLogin.textContent = 'Ingresando...'

    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value

    const { data, error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) {
      showError(error.message === 'Invalid login credentials'
        ? 'Email o contraseña incorrectos.'
        : error.message)
      btnLogin.disabled = false
      btnLogin.textContent = 'Ingresar'
    } else {
      const { data: teacherStatus } = await supabase.from('teachers').select('activo').eq('id', data.user.id).maybeSingle()
      if (teacherStatus && teacherStatus.activo === false) {
        await supabase.auth.signOut()
        showError('Tu cuenta está desactivada. Contactá al administrador para reactivarla.')
        btnLogin.disabled = false
        btnLogin.textContent = 'Ingresar'
        return
      }
      window.location.href = 'index.html'
    }
  })
</script>

</body>
</html>
